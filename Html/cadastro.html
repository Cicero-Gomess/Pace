<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../Images/Ícone_Pace.png" />
  <title>Pace</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../Css/base.css">
  <link rel="stylesheet" href="../Css/cadastro.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">
    <a href="../Html/index.html">
      <img src="../Images/Ícone_Pace.png" alt="Logo do site">
    </a>
  </div>

  <ul class="nav-links">
    <li><a href="sobre.html">Sobre</a></li>
    <li><a class="btn-entrar" href="entrar.html">Entrar</a></li>

<section class="cadastro">

  <div class="cadastro-container">

    <h1>Cadastre-se</h1>
    <p class="cadastro-sub">Crie sua conta</p>

    <form id="cadastroForm">

      <input type="text" id="cadastroUsuario" placeholder="Usuário">

      <input type="email" id="cadastroEmail" placeholder="Email">

      <input type="password" id="cadastroSenha" placeholder="Senha">

      <input type="password" id="cadastroConfirmarSenha" placeholder="Confirmar senha">

      <button type="submit" class="cadastro-submit">
        Criar conta
      </button>

    </form>

    <p id="cadastroMensagem"></p>

  </div>

</section>

<!-- JS -->
<script src="../JavaScript/cadastro.js"></script>

</body>
</html>
