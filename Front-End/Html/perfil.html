<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil</title>

<link rel="stylesheet" href="../Css/perfil.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

  <img src="../Images/Ícone_Pace.png" class="logo">

  <a href="feed.html">
    <i data-lucide="home" class="icon"></i>
    <span class="text">Feed</span>
  </a>

  <a href="#">
    <i data-lucide="target" class="icon"></i>
    <span class="text">Metas</span>
  </a>

  <a href="explorar.html">
    <i data-lucide="compass" class="icon"></i>
    <span class="text">Explorar</span>
  </a>

  <a href="postar.html">
    <i data-lucide="plus-square" class="icon"></i>
    <span class="text">Postar</span>
  </a>

  <a href="#">
    <i data-lucide="bell" class="icon"></i>
    <span class="text">Notificações</span>
  </a>

  <div class="divisor"></div>

  <a href="../Html/configurações.html">
    <i data-lucide="settings" class="icon"></i>
    <span class="text">Configurações</span>
  </a>

  <a href="perfil.html" class="perfil active">
    <img class="foto-perfil">
    <span class="text">Perfil</span>
  </a>

</div>

<!-- ===== CONTEÚDO ===== -->
<div class="conteudo">

  <div class="card-perfil">

    <h2>Meu Perfil</h2>

    <div class="foto-container">
      <img id="fotoPerfil">

      <label for="inputFoto" class="btn-trocar">
        📷 Trocar foto
      </label>

      <input type="file" id="inputFoto" hidden>
    </div>

    <div class="info-perfil">
      <p><strong>Nome:</strong> <span id="nomeUsuario"></span></p>
      <p><strong>Email:</strong> <span id="emailUsuario"></span></p>
    </div>

    <div class="perfil-stats">
      <div><strong id="totalPosts">0</strong><span>Posts</span></div>
      <div><strong id="totalLikes">0</strong><span>Likes</span></div>
      <div><strong id="totalComentarios">0</strong><span>Comentários</span></div>
    </div>

    <div class="perfil-bio">
      <textarea id="bioUsuario" placeholder="Escreva sua bio..."></textarea>
      <button id="salvarBio">Salvar</button>
    </div>

  </div>

  <!-- 🔥 NOVA SEPARAÇÃO -->
  <h3 class="titulo-secao">📸 Minhas Imagens</h3>
  <div id="postsImagem"></div>

  <h3 class="titulo-secao">📝 Meus Posts</h3>
  <div id="postsTexto"></div>

</div>

<!-- MODAL -->
<div id="modalPost" class="modal hidden">
  <div class="modal-content">
    <span id="fecharModal">&times;</span>
    <img id="modalImg">
    <p id="modalTexto"></p>
    <div class="modal-info">
      ❤️ <span id="modalLikes"></span>
      💬 <span id="modalComentarios"></span>
    </div>
  </div>
</div>

<script src="../JavaScript/perfil.js"></script>
</body>
</html>
