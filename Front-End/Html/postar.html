<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postar</title>

<link rel="stylesheet" href="../Css/postar.css">
<script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<div class="sidebar">

  <img src="../Images/Ícone_Pace.png" class="logo">

  <a href="feed.html">
    <i data-lucide="home" class="icon"></i>
    <span class="text">Feed</span>
  </a>

  <a href="#"><i data-lucide="target" class="icon"></i><span class="text">Metas</span></a>
  <a href="#"><i data-lucide="compass" class="icon"></i><span class="text">Explorar</span></a>

  <a href="#" class="active">
    <i data-lucide="plus-square" class="icon"></i>
    <span class="text">Postar</span>
  </a>

  <a href="#"><i data-lucide="bell" class="icon"></i><span class="text">Notificações</span></a>

  <div class="divisor"></div>

  <a href="../Html/configurações.html">
    <i data-lucide="settings" class="icon"></i>
    <span class="text">Configurações</span>
  </a>

  <a href="perfil.html" class="perfil">
    <img id="fotoSidebar" class="foto-perfil">
    <span class="text">Perfil</span>
  </a>

</div>

<div class="conteudo">

  <div class="card-postar">
    <h2>Criar Post</h2>

    

    <!-- 🔥 COMUNIDADE -->
<select id="comunidadePost" class="select-comunidade">
  <option value="geral">🌍 Geral</option>
  <option value="programacao">💻 Programação</option>
  <option value="estudos">📚 Estudos</option>
  <option value="academia">💪 Academia</option>
  <option value="mindset">🧠 Mindset</option>
</select>

<textarea id="textoPost" maxlength="200" placeholder="O que você está pensando?"></textarea>

<!-- resto igual -->

    <!-- BOTÃO BONITO -->
    <label for="imagemPost" class="btn-imagem">📷 Adicionar imagem</label>
    <input type="file" id="imagemPost" accept="image/*" hidden>

    <!-- PREVIEW -->
    <div id="previewImagem" class="preview-imagem hidden">
      <img id="imgPreview" src="">
      <span id="nomeImagem"></span>
      <button id="removerImagem">✖</button>
    </div>

    <div class="contador" id="contador">0/200</div>

    <button id="btnPostar">Postar</button>
  </div>

</div>

<script src="../JavaScript/postar.js"></script>
</body>
</html>
